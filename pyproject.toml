[tool.ruff]
line-length = 120
target-version = "py310"
extend-exclude = [
    "thirdparty",
    "dwpose",
    "sd-vae-ft-mse",
    "library",
    "cache",
    "greeting_cache",
    "dist",
    "build",
    "*.spec",
]

[tool.ruff.lint]
select = [
    "E",
    "F",
    "I",
    "W",
]
ignore = [
    "E501",
    "E402",
    "E741",
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["F401", "F811"]
"build_production_exe_fixed.py" = ["E", "F", "I", "W"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"

[tool.pytest.ini_options]
minversion = "7.0"
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "-v",
    "--tb=short",
]
